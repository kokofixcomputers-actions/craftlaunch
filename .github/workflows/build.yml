name: Build Nebulus Launch Pad

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    strategy:
      matrix:
        os: [blacksmith-2vcpu-windows-2025, macos-latest]

    runs-on: ${{ matrix.os }}
    env:
      NUITKA_ALLOW_DOWNLOADING: 1

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Run setup.sh (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          chmod +x ./setup.sh
          ./setup.sh

      - name: Run setup.bat (Windows)
        if: matrix.os == 'blacksmith-2vcpu-windows-2025'
        shell: cmd
        run: setup.bat

      - name: Remove frontend/node_modules
        shell: bash
        run: rm -rf frontend/node_modules

      - name: Move web folder
        shell: bash
        run: mv backend/web ./web

      - name: Cache Nuitka (All Platforms)
        uses: actions/cache@v3
        with:
          path: ~/.cache/Nuitka
          key: nuitka-${{ matrix.os }}
          restore-keys: |
            nuitka-

      - name: Cache pip (All Platforms)
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: pip-${{ matrix.os }}
          restore-keys: |
            pip-

      - name: Install Nuitka
        run: python -m pip install --upgrade pip && python -m pip install nuitka

      - name: Install Python dependencies
        run: |
          python -m pip install -r requirements.txt
          # Ensure exact versions you tested locally
          python -m pip install "pythonnet==3.0.5" "pywebview==6.0"

      # Discover paths to the *same* pythonnet runtime and pywebview lib
      - name: Find Windows package paths
        if: matrix.os == 'blacksmith-2vcpu-windows-2025'
        shell: pwsh
        run: |
          $pythonnetRuntime = python -c "import pythonnet, pathlib; print(pathlib.Path(pythonnet.__file__).parent / 'runtime')"
          $pywebviewLib = python -c "import webview, pathlib; print(pathlib.Path(webview.__file__).parent / 'lib')"

          Write-Host "Using pythonnet runtime from: $pythonnetRuntime"
          Write-Host "Using pywebview lib from: $pywebviewLib"

          "PYTHONNET_RUNTIME=$pythonnetRuntime" >> $env:GITHUB_ENV
          "PYWEBVIEW_LIB=$pywebviewLib" >> $env:GITHUB_ENV

      - name: Build with Nuitka (Windows)
        if: matrix.os == 'blacksmith-2vcpu-windows-2025'
        shell: pwsh
        run: |
          python -m nuitka `
            --mode=standalone `
            --assume-yes-for-downloads `
            --include-package-data=webview `
            --include-package-data=pythonnet `
            --include-data-dir=".=." `
            backend/main.py

      - name: Apply Windows post-build fixes
        if: matrix.os == 'blacksmith-2vcpu-windows-2025'
        shell: pwsh
        run: |
          $distDir = Get-ChildItem -Directory | Where-Object { $_.Name -like "*.dist" } | Select-Object -First 1
          if (-not $distDir) { throw "No standalone output folder found" }

          $distPath = $distDir.FullName
          Write-Host "Using dist folder: $distPath"

          # Ensure webview/lib exists
          New-Item -ItemType Directory -Force -Path (Join-Path $distPath "webview\\lib") | Out-Null

          # Copy the same Python.Runtime.dll you know works
          Copy-Item `
            (Join-Path $env:PYTHONNET_RUNTIME "Python.Runtime.dll") `
            $distPath `
            -Force

          # Copy pywebview native libs (like your manual fix)
          Copy-Item `
            (Join-Path $env:PYWEBVIEW_LIB "*") `
            (Join-Path $distPath "webview\\lib") `
            -Recurse `
            -Force

      - name: Upload artifact (Windows)
        if: matrix.os == 'blacksmith-2vcpu-windows-2025'
        uses: actions/upload-artifact@v4
        with:
          name: Nebulus-Launch-Pad-Windows-Standalone
          path: |
            *.dist/**

      - name: Build with Nuitka (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          python -m nuitka \
            --standalone \
            --assume-yes-for-downloads \
            --macos-create-app-bundle \
            backend/main.py \
            --include-data-dir=.=. \
            --macos-app-icon=icon.icns \
            --macos-app-name="Nebulus Launch Pad"

      - name: Rename Nuitka macOS .app
        if: matrix.os == 'macos-latest'
        run: |
          mv main.app "Nebulus Launch Pad.app"

      - name: Zip .app bundle (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          ditto -c -k --sequesterRsrc --keepParent "Nebulus Launch Pad.app" Nebulus-Launch-Pad-macOS.zip

      - name: Upload artifact (macOS)
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: Nebulus-Launch-Pad-macOS
          path: Nebulus-Launch-Pad-macOS.zip
